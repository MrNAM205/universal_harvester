<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Harvester Dashboard</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Glassmorphism containers */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        #sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--glass-border);
            height: 100%;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header .status {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 12px;
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        #chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-item:hover, .chat-item.active {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .chat-title {
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        #main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #main-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 1.5rem;
            font-weight: bold;
        }

        #message-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 12px;
            line-height: 1.5;
            position: relative;
        }

        .msg-user {
            align-self: flex-end;
            background: rgba(56, 189, 248, 0.2);
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-bottom-right-radius: 0;
        }

        .msg-bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 0;
        }

        .msg-role {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .msg-content {
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

    </style>
</head>
<body>

    <div id="sidebar" class="glass">
        <div class="header">
            <span>Universal Harvester</span>
            <span class="status">Online</span>
        </div>
        <div id="chat-list">
            <div class="empty-state" style="font-size:0.9rem">Loading chats...</div>
        </div>
    </div>

    <div id="main-panel">
        <div id="main-header" class="glass">Select a Chat</div>
        <div id="message-list">
            <div class="empty-state">No chat selected</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetchChats();
        });

        async function fetchChats() {
            try {
                const res = await fetch('/api/chats');
                const chats = await res.json();
                
                const listEl = document.getElementById('chat-list');
                listEl.innerHTML = '';
                
                if (chats.length === 0) {
                    listEl.innerHTML = '<div class="empty-state" style="font-size:0.9rem">No chats found in DB</div>';
                    return;
                }

                chats.forEach(chat => {
                    const item = document.createElement('div');
                    item.className = 'chat-item glass';
                    
                    const title = document.createElement('div');
                    title.className = 'chat-title';
                    title.textContent = chat.title || 'Untitled';
                    
                    const meta = document.createElement('div');
                    meta.className = 'chat-meta';
                    const d = new Date(chat.last_updated);
                    meta.innerHTML = `<span>${chat.message_count} msgs</span><span>${d.toLocaleDateString()}</span>`;
                    
                    item.appendChild(title);
                    item.appendChild(meta);
                    
                    item.addEventListener('click', () => {
                        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        loadChatDetail(chat.id, chat.title);
                    });
                    
                    listEl.appendChild(item);
                });
            } catch (err) {
                console.error("Failed to fetch chats", err);
            }
        }

        async function loadChatDetail(chatId, title) {
            const header = document.getElementById('main-header');
            const msgList = document.getElementById('message-list');
            
            header.textContent = title || 'Untitled Chat';
            msgList.innerHTML = '<div class="empty-state">Loading messages...</div>';
            
            try {
                const res = await fetch(`/api/chats/${chatId}`);
                const messages = await res.json();
                
                msgList.innerHTML = '';
                
                if (messages.length === 0) {
                    msgList.innerHTML = '<div class="empty-state">No messages in this chat.</div>';
                    return;
                }
                
                messages.forEach(msg => {
                    const el = document.createElement('div');
                    const isUser = msg.author_role.toLowerCase() === 'user';
                    el.className = `message glass ${isUser ? 'msg-user' : 'msg-bot'}`;
                    
                    const role = document.createElement('div');
                    role.className = 'msg-role';
                    role.textContent = msg.author_role;
                    
                    const content = document.createElement('div');
                    content.className = 'msg-content';
                    content.textContent = msg.content;
                    
                    el.appendChild(role);
                    el.appendChild(content);
                    msgList.appendChild(el);
                });
                
                // Scroll to bottom
                msgList.scrollTop = msgList.scrollHeight;
                
            } catch (err) {
                console.error("Failed to load chat details", err);
                msgList.innerHTML = '<div class="empty-state">Error loading messages</div>';
            }
        }
    </script>
</body>
</html>
